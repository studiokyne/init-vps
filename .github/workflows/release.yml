name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  lint:
    name: ShellCheck + syntax
    uses: ./.github/workflows/lint.yml

  release:
    name: Publish GitHub Release
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Inject version into script
        run: |
          sed "s/^SCRIPT_VERSION=.*/SCRIPT_VERSION=\"${{ steps.version.outputs.version }}\"/" \
            init-vps.sh > /tmp/init-vps.sh
          chmod +x /tmp/init-vps.sh
          bash -n /tmp/init-vps.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: /tmp/init-vps.sh
          name: "init-vps ${{ steps.version.outputs.version }}"
